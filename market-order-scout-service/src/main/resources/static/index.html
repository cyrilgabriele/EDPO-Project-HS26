<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Market Order Scout</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #17202a;
      --muted: #667085;
      --line: #d8dee8;
      --panel: #ffffff;
      --band: #f4f7fb;
      --accent: #0f766e;
      --accent-soft: #d8f3ef;
      --warn: #b45309;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--band);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
      padding: 28px 32px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 760;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .pill {
      padding: 5px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      white-space: nowrap;
    }

    .status {
      min-width: 180px;
      text-align: right;
      color: var(--muted);
      font-size: 13px;
    }

    main {
      padding: 24px 32px 36px;
    }

    .symbol-grid {
      display: grid;
      gap: 18px;
    }

    .symbol-panel {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 260px;
      gap: 20px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: 0 10px 30px rgb(15 23 42 / 7%);
    }

    .chart-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 18px;
    }

    h2 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .sample-count {
      color: var(--muted);
      font-size: 13px;
      white-space: nowrap;
    }

    .histogram {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: 1fr;
      align-items: end;
      gap: 6px;
      height: 340px;
      padding: 12px 4px 0;
      border-bottom: 1px solid var(--line);
    }

    .bar {
      position: relative;
      min-width: 7px;
      height: var(--height);
      border-radius: 4px 4px 0 0;
      background: linear-gradient(180deg, #14b8a6, #0f766e);
    }

    .bar span {
      position: absolute;
      left: 50%;
      bottom: calc(100% + 5px);
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
    }

    .axis {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-top: 8px;
      color: var(--muted);
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 12px;
    }

    .legend {
      align-self: stretch;
      border-left: 1px solid var(--line);
      padding-left: 20px;
    }

    .legend h3 {
      margin: 0 0 14px;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0;
      color: var(--muted);
    }

    .moment {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 10px 0;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }

    .moment strong {
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-weight: 650;
    }

    .empty {
      padding: 42px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: var(--panel);
      color: var(--muted);
      text-align: center;
    }

    .topic-row {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.7;
    }

    @media (max-width: 820px) {
      header {
        display: block;
        padding: 22px 18px 16px;
      }

      .status {
        margin-top: 12px;
        text-align: left;
      }

      main {
        padding: 18px;
      }

      .symbol-panel {
        grid-template-columns: 1fr;
      }

      .legend {
        border-left: 0;
        border-top: 1px solid var(--line);
        padding: 16px 0 0;
      }

      .histogram {
        height: 260px;
        gap: 4px;
      }
    }
  </style>
</head>
<body>
<header>
  <div>
    <h1>Market Order Scout</h1>
    <div class="meta">
      <span class="pill">Kafka Streams state store</span>
      <span class="pill">log(minAskPrice)</span>
      <span class="pill">latest 50 windows</span>
    </div>
  </div>
  <div class="status" id="status">Waiting for dashboard data</div>
</header>
<main>
  <section id="symbols" class="symbol-grid"></section>
  <section class="topic-row" id="topics"></section>
</main>

<script>
  const statusEl = document.getElementById('status');
  const symbolsEl = document.getElementById('symbols');
  const topicsEl = document.getElementById('topics');
  let refreshMs = 3000;

  function fmt(value, digits = 6) {
    if (value === null || value === undefined || !Number.isFinite(Number(value))) return '0';
    return Number(value).toLocaleString(undefined, { maximumFractionDigits: digits });
  }

  function renderTopics(topics) {
    if (!topics) {
      topicsEl.textContent = '';
      return;
    }
    topicsEl.textContent = Object.entries(topics)
      .map(([name, topic]) => `${name}: ${topic}`)
      .join('  |  ');
  }

  function renderSymbols(symbols) {
    if (!symbols || symbols.length === 0) {
      symbolsEl.innerHTML = '<div class="empty">No positive min ask summaries have reached the dashboard store yet.</div>';
      return;
    }

    symbolsEl.innerHTML = symbols.map(symbol => {
      const bins = symbol.histogramBins || [];
      const maxCount = Math.max(1, ...bins.map(bin => bin.count || 0));
      const first = bins[0];
      const last = bins[bins.length - 1];
      const bars = bins.map(bin => {
        const height = Math.max(2, ((bin.count || 0) / maxCount) * 100);
        return `<div class="bar" style="--height:${height}%;" title="${fmt(bin.lowerBound)} to ${fmt(bin.upperBound)}"><span>${bin.count}</span></div>`;
      }).join('');
      const moments = symbol.moments || {};

      return `
        <article class="symbol-panel">
          <div>
            <div class="chart-head">
              <h2>${symbol.symbol}</h2>
              <div class="sample-count">${symbol.count} windows</div>
            </div>
            <div class="histogram">${bars}</div>
            <div class="axis">
              <span>${first ? fmt(first.lowerBound) : '0'}</span>
              <span>log min ask price</span>
              <span>${last ? fmt(last.upperBound) : '0'}</span>
            </div>
          </div>
          <aside class="legend">
            <h3>Moments</h3>
            <div class="moment"><span>Mean</span><strong>${fmt(moments.mean)}</strong></div>
            <div class="moment"><span>Variance</span><strong>${fmt(moments.variance)}</strong></div>
            <div class="moment"><span>Skewness</span><strong>${fmt(moments.skewness)}</strong></div>
            <div class="moment"><span>Kurtosis</span><strong>${fmt(moments.kurtosis)}</strong></div>
          </aside>
        </article>
      `;
    }).join('');
  }

  async function loadDashboard() {
    try {
      const res = await fetch('/api/dashboard');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      refreshMs = data.refreshIntervalMillis || refreshMs;
      renderSymbols(data.symbols);
      renderTopics(data.topics);
      statusEl.textContent = `Updated ${new Date().toLocaleTimeString()}`;
    } catch (error) {
      statusEl.textContent = `Dashboard unavailable: ${error.message}`;
    } finally {
      window.setTimeout(loadDashboard, refreshMs);
    }
  }

  loadDashboard();
</script>
</body>
</html>
