spring:
  application:
    name: market-order-scout-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

server:
  port: 8086

crypto:
  market-scout:
    topology:
      enabled: ${MARKET_SCOUT_TOPOLOGY_ENABLED:true}
    ask-threshold: ${MARKET_SCOUT_ASK_THRESHOLD:100000.00}
    window-size: ${MARKET_SCOUT_WINDOW_SIZE:30s}
    source-venue: ${MARKET_SCOUT_SOURCE_VENUE:BINANCE_USD_M_FUTURES}
  kafka:
    topic:
      scout-raw: crypto.scout.raw
      scout-derived-partitions: 3
      scout-ask-quotes: crypto.scout.ask-quotes
      scout-matchable-asks: crypto.scout.matchable-asks
      scout-ask-opportunities: crypto.scout.ask-opportunities
      scout-window-summary: crypto.scout.window-summary
      # Per-topic retention for scout-derived topics. Matching window is 35s
      # (validity 30s + grace 5s) — keep 5 minutes for operator visibility.
      scout-retention-ms: ${SCOUT_TOPIC_RETENTION_MS:300000}        # 5 minutes
      scout-retention-bytes: ${SCOUT_TOPIC_RETENTION_BYTES:52428800} # 50 MB/partition
      scout-segment-bytes: ${SCOUT_TOPIC_SEGMENT_BYTES:5242880}      # 5 MB
      scout-segment-ms: ${SCOUT_TOPIC_SEGMENT_MS:60000}              # force roll every 1 min

management:
  endpoints:
    web:
      exposure:
        include: health
