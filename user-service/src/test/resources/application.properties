spring.datasource.url=jdbc:h2:mem:userdb;MODE=PostgreSQL;DATABASE_TO_UPPER=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false
camunda.client.enabled=false
spring.autoconfigure.exclude=io.camunda.zeebe.spring.client.CamundaAutoConfiguration
user.confirmation.base-url=http://localhost:8083
