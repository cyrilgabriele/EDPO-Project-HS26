server:
  port: 8082

spring:
  application:
    name: portfolio-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/cryptoflow}
    username: ${SPRING_DATASOURCE_USERNAME:cryptoflow}
    password: ${SPRING_DATASOURCE_PASSWORD:cryptoflow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:29092}
    consumer:
      group-id: portfolio-service-group
      auto-offset-reset: earliest

camunda:
  client:
    mode: saas
    auth:
      client-id: ${CAMUNDA_CLIENT_ID_PORTFOLIO_SERVICE}
      client-secret: ${CAMUNDA_CLIENT_SECRET_PORTFOLIO_SERVICE}
    cluster-id: ${CAMUNDA_CLUSTER_ID_PORTFOLIO_SERVICE}
    region: ${CAMUNDA_REGION_PORTFOLIO_SERVICE}

# Kafka topic names (must match market-data-service)
crypto:
  kafka:
    topic:
      price-raw: crypto.price.raw
      price-raw-dlt: crypto.price.raw.DLT
      portfolio-compensation: crypto.portfolio.compensation
      user-compensation: crypto.user.compensation

management:
  endpoints:
    web:
      exposure:
        include: health
