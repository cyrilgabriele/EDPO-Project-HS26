        stroke: #1565c0;
      }
      .scout {
        fill: #fff8e1;
        stroke: #ef6c00;
      }
      .reference {
        fill: #e0f2fe;
        stroke: #0369a1;
      }
      .user {
        fill: #f3e5f5;
        stroke: #6a1b9a;
      }
      .portfolio {
        fill: #ede7f6;
        stroke: #4527a0;
      }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto" markerUnits="strokeWidth">
