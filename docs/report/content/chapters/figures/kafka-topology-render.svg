        font-family: Arial, Helvetica, sans-serif;
      }
      .background {
        fill: #fcfcfb;
      }
      .header {
        fill: #111827;
        font-size: 30px;
        font-weight: 700;
      }
      .column-title {
        fill: #334155;
        font-size: 20px;
        font-weight: 700;
      }
      .section-title {
        fill: #111827;
        font-size: 23px;
        font-weight: 700;
      }
      .section-rule {
        stroke: #cbd5e1;
        stroke-width: 2;
      }
      .service {
        fill: #f3f4f6;
        stroke: #6b7280;
        stroke-width: 2;
      }
      .consumer {
        fill: #f8fafc;
        stroke: #94a3b8;
        stroke-width: 2;
      }
      .topic {
        stroke-width: 3;
      }
      .service-text {
