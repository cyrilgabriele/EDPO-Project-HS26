        font-size: 15px;
      }
      .edge {
        stroke: #475569;
        stroke-width: 2.2;
        stroke-linecap: round;
      }
      .price {
        fill: #e8f5e9;
        stroke: #2e7d32;
      }
      .dlt {
        fill: #ffebee;
        stroke: #c62828;
      }
      .order {
