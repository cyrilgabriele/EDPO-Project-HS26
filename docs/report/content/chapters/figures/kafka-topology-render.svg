<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2320" viewBox="0 0 1800 2320" role="img" aria-labelledby="title desc">
  <title id="title">Kafka topic topology</title>
  <desc id="desc">Current CryptoFlow Kafka topics grouped by producer, topic, and consumer without crossing edges.</desc>

  <defs>
