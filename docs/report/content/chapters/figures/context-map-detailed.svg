<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="900" viewBox="0 0 1500 900" role="img" aria-labelledby="title desc">
  <title id="title">CryptoFlow platform context map</title>
  <desc id="desc">Simplified platform topology with external inputs, service groups, a Kafka event backbone, and a Camunda orchestration backbone.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#546E7A"/>
    </marker>
    <style>
      text { font-family: "Segoe UI", Arial, sans-serif; fill: #263238; }
      .title { font-size: 24px; font-weight: 700; }
      .label { font-size: 18px; font-weight: 600; }
      .small { font-size: 14px; fill: #37474F; }
      .box { stroke: #78909C; stroke-width: 2; rx: 8; ry: 8; }
      .platform { fill: #F5F5F5; stroke: #B0BEC5; stroke-width: 2; rx: 14; ry: 14; }
      .section { fill: none; stroke: #CFD8DC; stroke-width: 2; rx: 12; ry: 12; }
      .external { fill: #FFF3E0; }
      .reference { fill: #E0F7FA; }
      .metadata { fill: #E0F2F1; }
      .market { fill: #FFF8E1; }
      .user { fill: #FCE4EC; }
      .onboarding { fill: #EDE7F6; }
      .trading { fill: #E3F2FD; }
      .portfolio { fill: #E8F5E9; }
      .backbone { fill: #ECEFF1; stroke: #78909C; stroke-width: 2; rx: 10; ry: 10; }
      .orchestration { fill: #F3E5F5; stroke: #7E57C2; stroke-width: 2; rx: 10; ry: 10; }
      .flow { fill: none; stroke: #546E7A; stroke-width: 2.3; marker-end: url(#arrow); }
      .dashed { fill: none; stroke: #7E57C2; stroke-width: 2.2; stroke-dasharray: 7 6; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1500" height="900" fill="transparent"/>

  <rect class="box external" x="120" y="30" width="482" height="70"/>
  <text class="label" x="361" y="60" text-anchor="middle">Binance feeds</text>
  <text class="small" x="361" y="84" text-anchor="middle">ticker and partial book streams</text>

  <rect class="box reference" x="915" y="30" width="220" height="70"/>
  <text class="label" x="1025" y="60" text-anchor="middle">FX provider</text>
  <text class="small" x="1025" y="84" text-anchor="middle">exchange rates</text>

  <rect class="box metadata" x="1152" y="30" width="220" height="70"/>
  <text class="label" x="1262" y="60" text-anchor="middle">CoinGecko</text>
  <text class="small" x="1262" y="84" text-anchor="middle">coin metadata</text>

  <rect class="platform" x="70" y="135" width="1360" height="690"/>
  <text class="title" x="750" y="172" text-anchor="middle">CryptoFlow platform</text>

  <rect class="section" x="105" y="195" width="745" height="165"/>
  <text class="label" x="477" y="222" text-anchor="middle">Market data context</text>

  <rect class="box market" x="135" y="250" width="200" height="74"/>
  <text class="label" x="235" y="282" text-anchor="middle">market-data</text>
  <text class="small" x="235" y="305" text-anchor="middle">prices, localized, OHLC</text>

  <rect class="box market" x="385" y="250" width="205" height="74"/>
  <text class="label" x="487" y="282" text-anchor="middle">partial-book</text>
  <text class="small" x="487" y="305" text-anchor="middle">raw order book depth</text>

  <rect class="box market" x="640" y="250" width="180" height="74"/>
  <text class="label" x="730" y="282" text-anchor="middle">order-scout</text>
  <text class="small" x="730" y="305" text-anchor="middle">ask-side signals</text>

  <rect class="section" x="895" y="195" width="500" height="165"/>
  <text class="label" x="1145" y="222" text-anchor="middle">Reference data context</text>

  <rect class="box reference" x="930" y="250" width="190" height="74"/>
  <text class="label" x="1025" y="282" text-anchor="middle">fx-rate</text>
  <text class="small" x="1025" y="305" text-anchor="middle">reference.fx.rate</text>

  <rect class="box metadata" x="1165" y="250" width="195" height="74"/>
  <text class="label" x="1262" y="282" text-anchor="middle">coin-metadata</text>
  <text class="small" x="1262" y="305" text-anchor="middle">reference metadata</text>

  <rect class="backbone" x="145" y="405" width="1210" height="120"/>
  <text class="title" x="750" y="438" text-anchor="middle">Kafka event backbone</text>
  <text class="small" x="750" y="468" text-anchor="middle">price topics | reference topics | identity topics | market-scout topics | order topics | compensation topics</text>
  <text class="small" x="750" y="494" text-anchor="middle">Services publish and materialize local read models instead of calling each other synchronously.</text>

  <rect class="orchestration" x="145" y="560" width="1210" height="55"/>
  <text class="label" x="750" y="594" text-anchor="middle">Camunda orchestration backbone: onboarding and placeOrder jobs</text>

  <rect class="section" x="105" y="650" width="745" height="130"/>
  <text class="label" x="477" y="677" text-anchor="middle">Identity and process services</text>

  <rect class="box onboarding" x="145" y="700" width="200" height="56"/>
  <text class="label" x="245" y="734" text-anchor="middle">onboarding-service</text>

  <rect class="box user" x="405" y="700" width="190" height="56"/>
  <text class="label" x="500" y="734" text-anchor="middle">user-service</text>

  <rect class="section" x="895" y="650" width="500" height="130"/>
  <text class="label" x="1145" y="677" text-anchor="middle">Trading and portfolio services</text>

  <rect class="box trading" x="930" y="700" width="190" height="56"/>
  <text class="label" x="1025" y="734" text-anchor="middle">transaction-service</text>

  <rect class="box portfolio" x="1170" y="700" width="190" height="56"/>
  <text class="label" x="1265" y="734" text-anchor="middle">portfolio-service</text>

  <rect class="box" x="565" y="790" width="370" height="58" fill="#FFFDE7" stroke="#BDBDBD"/>
  <text class="label" x="750" y="815" text-anchor="middle">shared-events module</text>
  <text class="small" x="750" y="837" text-anchor="middle">Kafka contracts shared by the platform services</text>

  <text class="label" x="40" y="595" text-anchor="middle">End user</text>
  <circle cx="40" cy="535" r="12" fill="#FAFAFA" stroke="#37474F" stroke-width="2"/>
  <path d="M40 547 L40 585 M15 562 L65 562 M40 585 L20 620 M40 585 L60 620" fill="none" stroke="#37474F" stroke-width="2"/>

  <rect class="box trading" x="15" y="680" width="110" height="62"/>
  <text class="label" x="70" y="707" text-anchor="middle">Camunda</text>
  <text class="small" x="70" y="729" text-anchor="middle">Tasklist</text>

  <path class="flow" d="M235 100 L235 250"/>
  <path class="flow" d="M487 100 L487 250"/>
  <path class="flow" d="M1025 100 L1025 250"/>
  <path class="flow" d="M1262 100 L1262 250"/>

  <path class="flow" d="M235 324 L235 405"/>
  <path class="flow" d="M487 324 L487 405"/>
  <path class="flow" d="M718 324 L718 405"/>
  <path class="flow" d="M1025 324 L1025 405"/>
  <path class="flow" d="M1262 324 L1262 405"/>

  <path class="flow" d="M235 525 L235 700"/>
  <path class="flow" d="M500 525 L500 700"/>
  <path class="flow" d="M1025 525 L1025 700"/>
  <path class="flow" d="M1265 525 L1265 700"/>
  <path class="flow" d="M742 405 L742 324"/>
  <text class="small" x="760" y="378">scout consumes raw</text>
  <text class="small" x="760" y="396">and republishes derived events</text>

  <path class="dashed" d="M70 742 L70 588 L145 588"/>
  <path class="dashed" d="M245 615 L245 700"/>
  <path class="dashed" d="M500 615 L500 700"/>
  <path class="dashed" d="M1025 615 L1025 700"/>
  <path class="dashed" d="M1265 615 L1265 700"/>
  <path class="dashed" d="M40 620 L70 680"/>
</svg>
