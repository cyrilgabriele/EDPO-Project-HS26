<svg xmlns="http://www.w3.org/2000/svg" contentStyleType="text/css" data-diagram-type="SEQUENCE" width="1040" height="760" viewBox="0 0 1040 760" preserveAspectRatio="none">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 4 L 0 8 z" fill="#546E7A"/>
    </marker>
    <marker id="arrow-rev" markerWidth="10" markerHeight="8" refX="1" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M 10 0 L 0 4 L 10 8 z" fill="#546E7A"/>
    </marker>
    <style>
      .actor, .box, .queue { stroke: #78909C; stroke-width: .5; }
      .box { rx: 2.5; ry: 2.5; }
      .lifeline { stroke: #B0BEC5; stroke-width: .5; stroke-dasharray: 5 5; }
      .msg { stroke: #546E7A; stroke-width: 1; fill: none; marker-end: url(#arrow); }
      .msg-back { stroke: #546E7A; stroke-width: 1; fill: none; marker-start: url(#arrow-rev); }
      .async { stroke-dasharray: 2 2; }
      .label { fill: #37474F; font-family: "Segoe UI", Arial, sans-serif; font-size: 11px; }
      .head { fill: #000000; font-family: "Segoe UI", Arial, sans-serif; font-size: 14px; }
      .group { fill: none; stroke: #90A4AE; stroke-width: 1.5; }
      .group-head { fill: #ECEFF1; stroke: #90A4AE; stroke-width: 1.5; }
      .group-title { fill: #37474F; font-family: "Segoe UI", Arial, sans-serif; font-size: 13px; font-weight: 700; }
      .guard { fill: #000000; font-family: "Segoe UI", Arial, sans-serif; font-size: 11px; font-weight: 700; }
    </style>
  </defs>

  <text class="head" x="25" y="76">End user</text>
  <circle class="actor" cx="57" cy="13" r="8" fill="#FAFAFA"/>
  <path class="actor" d="M57 21 L57 48 M44 29 L70 29 M57 48 L44 63 M57 48 L70 63" fill="none"/>

  <rect class="box" x="135" y="34" width="95" height="47" rx="2.5" ry="2.5" fill="#EDE7F6"/>
  <text class="head" x="151" y="54">Camunda</text>
  <text class="head" x="145" y="70">placeOrder</text>

  <rect class="box" x="290" y="50" width="145" height="31" rx="2.5" ry="2.5" fill="#E3F2FD"/>
  <text class="head" x="300" y="70">transaction-service</text>

  <path class="queue" d="M514 55 L562 55 C567 55 567 68 567 68 C567 68 567 81 562 81 L514 81 C509 81 509 68 509 68 C509 68 509 55 514 55" fill="#FFF3E0"/>
  <path class="queue" d="M562 55 C557 55 557 68 557 68 C557 81 562 81 562 81" fill="none"/>
  <text class="head" x="516" y="74">Kafka</text>

  <rect class="box" x="638" y="42" width="190" height="39" rx="2.5" ry="2.5" fill="#FFF8E1"/>
  <text class="head" x="648" y="66">market-order-scout-service</text>

  <rect class="box" x="885" y="50" width="130" height="31" rx="2.5" ry="2.5" fill="#E8F5E9"/>
  <text class="head" x="895" y="70">portfolio-service</text>

  <line class="lifeline" x1="57" y1="82" x2="57" y2="650"/>
  <line class="lifeline" x1="183" y1="82" x2="183" y2="650"/>
  <line class="lifeline" x1="363" y1="82" x2="363" y2="650"/>
  <line class="lifeline" x1="538" y1="82" x2="538" y2="650"/>
  <line class="lifeline" x1="733" y1="82" x2="733" y2="650"/>
  <line class="lifeline" x1="950" y1="82" x2="950" y2="650"/>

  <line class="msg" x1="58" y1="112" x2="178" y2="112"/>
  <text class="label" x="68" y="107">submit order form</text>
  <line class="msg" x1="184" y1="140" x2="358" y2="140"/>
  <text class="label" x="194" y="135">run placeOrderWorker</text>

  <path class="msg-back" d="M365 173 H420 V188 H365"/>
  <text class="label" x="372" y="157">validate user against</text>
  <text class="label" x="372" y="170">local confirmed-user read model</text>
  <path class="msg-back" d="M365 226 H420 V241 H365"/>
  <text class="label" x="372" y="210">persist pending transaction</text>
  <line class="msg" x1="364" y1="270" x2="533" y2="270"/>
  <text class="label" x="374" y="265">publish transaction.buy-bids</text>

  <line class="msg" x1="733" y1="300" x2="543" y2="300"/>
  <text class="label" x="578" y="295">publish crypto.scout.matchable-asks</text>
  <line class="msg-back async" x1="368" y1="330" x2="533" y2="330"/>
  <text class="label" x="378" y="325">deliver BuyBid and MatchableAsk</text>
  <path class="msg-back" d="M365 369 H420 V384 H365"/>
  <text class="label" x="372" y="353">match bid/ask by symbol</text>
  <text class="label" x="372" y="366">30s validity + 5s grace</text>

  <rect class="group" x="10" y="405" width="1015" height="335"/>
  <path class="group-head" d="M10 405 H72 V422 L62 432 H10 Z"/>
  <text class="group-title" x="25" y="419">alt</text>
  <text class="guard" x="86" y="420">[Order match before PT35S timeout]</text>

  <line class="msg" x1="364" y1="452" x2="533" y2="452"/>
  <text class="label" x="374" y="447">publish transaction.order-matched</text>
  <line class="msg-back async" x1="368" y1="482" x2="533" y2="482"/>
  <text class="label" x="378" y="477">consume order-matched event</text>
  <line class="msg-back" x1="188" y1="512" x2="358" y2="512"/>
  <text class="label" x="198" y="501">correlate priceMatchedEvent</text>
  <text class="label" x="198" y="514">by transactionId</text>
  <line class="msg" x1="184" y1="542" x2="358" y2="542"/>
  <text class="label" x="194" y="531">run approveOrderWorker</text>
  <text class="label" x="194" y="544">+ publishOrderApprovedWorker</text>
  <line class="msg" x1="364" y1="572" x2="533" y2="572"/>
  <text class="label" x="374" y="567">publish transaction.order.approved</text>
  <line class="msg async" x1="543" y1="602" x2="945" y2="602"/>
  <text class="label" x="715" y="597">consume approved order</text>
  <path class="msg-back" d="M952 622 H998 V637 H952"/>
  <text class="label" x="958" y="617">upsert holding</text>
  <line class="msg-back async" x1="62" y1="630" x2="178" y2="630"/>
  <text class="label" x="72" y="625">send execution email</text>

  <line x1="10" y1="646" x2="1025" y2="646" stroke="#90A4AE" stroke-width="1" stroke-dasharray="2 2"/>
  <text class="guard" x="15" y="663">[No match before PT35S timeout]</text>
  <line class="msg" x1="184" y1="690" x2="358" y2="690"/>
  <text class="label" x="194" y="685">run rejectOrderWorker</text>
  <line class="msg-back async" x1="62" y1="720" x2="178" y2="720"/>
  <text class="label" x="72" y="715">send rejection email</text>
</svg>
