server:
  port: 8083

logging:
  level:
    root: WARN
    ch.unisg.cryptoflow.transaction.adapter.in.camunda: DEBUG
    ch.unisg.cryptoflow.transaction.application: DEBUG

spring:
  application:
    name: transaction-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/transaction_service_db}
    username: ${SPRING_DATASOURCE_USERNAME:cryptoflow}
    password: ${SPRING_DATASOURCE_PASSWORD:cryptoflow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: transaction-service-group
      auto-offset-reset: earliest

camunda:
  client:
    mode: saas
    auth:
      client-id: ${CAMUNDA_CLIENT_ID_TRANSACTION_SERVICE}
      client-secret: ${CAMUNDA_CLIENT_SECRET_TRANSACTION_SERVICE}
    cluster-id: ${CAMUNDA_CLUSTER_ID_TRANSACTION_SERVICE}
    region: ${CAMUNDA_REGION_TRANSACTION_SERVICE}

crypto:
  kafka:
    topic:
      price-raw: crypto.price.raw
      price-raw-dlt: crypto.price.raw.DLT
      buy-bids: transaction.buy-bids
      order-matched: transaction.order-matched
      matchable-asks: crypto.scout.matchable-asks
      order-approved: transaction.order.approved
      user-confirmed: user.confirmed
  transaction-matching:
    topology:
      enabled: ${TRANSACTION_MATCHING_TOPOLOGY_ENABLED:true}
    validity-window: ${TRANSACTION_MATCHING_VALIDITY_WINDOW:30s}
    grace-period: ${TRANSACTION_MATCHING_GRACE_PERIOD:5s}

management:
  endpoints:
    web:
      exposure:
        include: health
