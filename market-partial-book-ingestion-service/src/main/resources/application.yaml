spring:
  application:
    name: market-partial-book-ingestion-service
  jackson:
    serialization:
      write-dates-as-timestamps: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

server:
  port: 8087

binance:
  partial-depth:
    enabled: ${BINANCE_PARTIAL_DEPTH_ENABLED:true}
    stream-url: ${BINANCE_PARTIAL_DEPTH_STREAM_URL:wss://fstream.binance.com/stream?streams=}
    symbols: ${BINANCE_PARTIAL_DEPTH_SYMBOLS:BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT,LTCUSDT}
    depth: ${BINANCE_PARTIAL_DEPTH_LEVELS:20}
    update-speed: ${BINANCE_PARTIAL_DEPTH_UPDATE_SPEED:250ms}

crypto:
  kafka:
    topic:
      scout-raw: crypto.scout.raw
      scout-raw-partitions: 3
      # Per-topic retention for the raw partial-book-depth feed. Downstream
      # consumers (market-order-scout-service) react in real time; old data
      # has no replay value and would otherwise dominate broker disk.
      scout-raw-retention-ms: ${SCOUT_RAW_RETENTION_MS:300000}        # 5 minutes
      scout-raw-retention-bytes: ${SCOUT_RAW_RETENTION_BYTES:52428800} # 50 MB/partition
      scout-raw-segment-bytes: ${SCOUT_RAW_SEGMENT_BYTES:5242880}      # 5 MB
      scout-raw-segment-ms: ${SCOUT_RAW_SEGMENT_MS:60000}              # force roll every 1 min

management:
  endpoints:
    web:
      exposure:
        include: health
